spring.application.name=patchpilot-backend
server.port=8080
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
patchpilot.github.webhook-secret=${PATCHPILOT_GITHUB_WEBHOOK_SECRET:}
patchpilot.github.token=${PATCHPILOT_GITHUB_TOKEN:}
patchpilot.workspace.root-dir=${PATCHPILOT_WORKSPACE_ROOT_DIR:/tmp/patchpilot/workspaces}
patchpilot.repository-preflight.allowed-root-dirs=${PATCHPILOT_REPOSITORY_PREFLIGHT_ALLOWED_ROOT_DIRS:.,docs/demo-repositories}
patchpilot.agent.provider=${PATCHPILOT_AGENT_PROVIDER:openai-compatible}
patchpilot.agent.model=${PATCHPILOT_AGENT_MODEL:gpt-4.1-mini}
patchpilot.agent.base-url=${PATCHPILOT_AGENT_BASE_URL:https://api.openai.com/v1}
patchpilot.agent.api-key=${PATCHPILOT_AGENT_API_KEY:}
patchpilot.safety.allowed-trigger-users=${PATCHPILOT_ALLOWED_TRIGGER_USERS:}
patchpilot.safety.allowed-repositories=${PATCHPILOT_ALLOWED_REPOSITORIES:}
patchpilot.safety.model-trigger-classification-enabled=${PATCHPILOT_MODEL_TRIGGER_CLASSIFICATION_ENABLED:false}
patchpilot.safety.trigger-rate-limit-enabled=${PATCHPILOT_TRIGGER_RATE_LIMIT_ENABLED:true}
patchpilot.safety.trigger-rate-limit-window-ms=${PATCHPILOT_TRIGGER_RATE_LIMIT_WINDOW_MS:600000}
patchpilot.safety.trigger-rate-limit-max-per-trigger-user=${PATCHPILOT_TRIGGER_RATE_LIMIT_MAX_PER_TRIGGER_USER:30}
patchpilot.safety.trigger-rate-limit-max-per-repository=${PATCHPILOT_TRIGGER_RATE_LIMIT_MAX_PER_REPOSITORY:60}
patchpilot.safety.trigger-rate-limit-max-per-issue=${PATCHPILOT_TRIGGER_RATE_LIMIT_MAX_PER_ISSUE:20}
patchpilot.safety.rejected-trigger-quarantine-enabled=${PATCHPILOT_REJECTED_TRIGGER_QUARANTINE_ENABLED:true}
patchpilot.safety.rejected-trigger-quarantine-window-ms=${PATCHPILOT_REJECTED_TRIGGER_QUARANTINE_WINDOW_MS:600000}
patchpilot.safety.rejected-trigger-quarantine-threshold=${PATCHPILOT_REJECTED_TRIGGER_QUARANTINE_THRESHOLD:5}
patchpilot.safety.rejected-trigger-quarantine-cooldown-ms=${PATCHPILOT_REJECTED_TRIGGER_QUARANTINE_COOLDOWN_MS:1800000}
patchpilot.review-approval.allowed-operators=${PATCHPILOT_REVIEW_APPROVAL_ALLOWED_OPERATORS:}
patchpilot.security.admin-token=${PATCHPILOT_ADMIN_TOKEN:}
patchpilot.dashboard.base-url=${PATCHPILOT_DASHBOARD_BASE_URL:}
