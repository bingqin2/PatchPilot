services:
  mysql:
    image: mysql:8.4
    container_name: patchpilot-mysql
    environment:
      MYSQL_DATABASE: patchpilot
      MYSQL_USER: patchpilot
      MYSQL_PASSWORD: patchpilot
      MYSQL_ROOT_PASSWORD: patchpilot-root
    volumes:
      - patchpilot-mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -ppatchpilot-root --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  patchpilot-backend:
    build:
      context: .
      dockerfile: PatchPilot/Dockerfile
    image: patchpilot-backend:local
    container_name: patchpilot-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      PATCHPILOT_GITHUB_WEBHOOK_SECRET: ${PATCHPILOT_GITHUB_WEBHOOK_SECRET}
      PATCHPILOT_GITHUB_TOKEN: ${PATCHPILOT_GITHUB_TOKEN:-}
      PATCHPILOT_ADMIN_TOKEN: ${PATCHPILOT_ADMIN_TOKEN:-}
      PATCHPILOT_DASHBOARD_ADMIN_TOKEN_BOOTSTRAP_ENABLED: ${PATCHPILOT_DASHBOARD_ADMIN_TOKEN_BOOTSTRAP_ENABLED:-false}
      PATCHPILOT_DASHBOARD_BASE_URL: ${PATCHPILOT_DASHBOARD_BASE_URL:-}
      PATCHPILOT_MODEL_TRIGGER_CLASSIFICATION_ENABLED: ${PATCHPILOT_MODEL_TRIGGER_CLASSIFICATION_ENABLED:-false}
      PATCHPILOT_TRIGGER_RATE_LIMIT_ENABLED: ${PATCHPILOT_TRIGGER_RATE_LIMIT_ENABLED:-true}
      PATCHPILOT_TRIGGER_RATE_LIMIT_WINDOW_MS: ${PATCHPILOT_TRIGGER_RATE_LIMIT_WINDOW_MS:-600000}
      PATCHPILOT_TRIGGER_RATE_LIMIT_MAX_PER_TRIGGER_USER: ${PATCHPILOT_TRIGGER_RATE_LIMIT_MAX_PER_TRIGGER_USER:-30}
      PATCHPILOT_TRIGGER_RATE_LIMIT_MAX_PER_REPOSITORY: ${PATCHPILOT_TRIGGER_RATE_LIMIT_MAX_PER_REPOSITORY:-60}
      PATCHPILOT_TRIGGER_RATE_LIMIT_MAX_PER_ISSUE: ${PATCHPILOT_TRIGGER_RATE_LIMIT_MAX_PER_ISSUE:-20}
      PATCHPILOT_WORKSPACE_ROOT_DIR: ${PATCHPILOT_WORKSPACE_ROOT_DIR:-/tmp/patchpilot/workspaces}
      PATCHPILOT_AGENT_PROVIDER: ${PATCHPILOT_AGENT_PROVIDER:-openai-compatible}
      PATCHPILOT_AGENT_MODEL: ${PATCHPILOT_AGENT_MODEL:-gpt-4.1-mini}
      PATCHPILOT_AGENT_BASE_URL: ${PATCHPILOT_AGENT_BASE_URL:-https://api.openai.com/v1}
      PATCHPILOT_AGENT_API_KEY: ${PATCHPILOT_AGENT_API_KEY:-}
    ports:
      - "8080:8080"

volumes:
  patchpilot-mysql-data:
